<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>體積的量度 (iPad 優化學生版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        /* 防止 iPad 長按出現選單與系統滾動 */
        * { -webkit-touch-callout: none; -webkit-user-select: none; }
        body { margin: 0; font-family: system-ui, sans-serif; overflow: hidden; background: #f0f2f5; touch-action: none; }
        
        #ui { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(255, 255, 255, 0.85); 
            padding: 15px; border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            width: 250px; z-index: 100; 
            transition: transform 0.4s ease;
        }
        #ui.collapsed { transform: translateX(-240px); }

        #toggleBtn {
            position: absolute; right: 10px; top: 10px;
            background: #007bff; color: white; border: none;
            border-radius: 4px; width: 35px; height: 35px; /* 加大按鈕好點擊 */
            cursor: pointer; font-weight: bold;
        }
        #ui.collapsed #toggleBtn { right: -45px; }

        .volume-box { background: #e8f5e9; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 10px; border: 1px solid #28a745; }
        #count { font-size: 24px; font-weight: bold; color: #2e7d32; }

        .btn { width: 100%; padding: 12px; margin: 5px 0; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; }
        .btn-add { background: #28a745; color: white; }
        .btn-del { background: #dc3545; color: white; }
        .active { outline: 4px solid #000; }
        
        .control-group { background: #f8f9fa; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        
        /* 讓畫布撐滿全屏 */
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>

<div id="ui">
    <button id="toggleBtn" onclick="toggleUI()">◀</button>
    <div style="margin-bottom:10px; border-bottom:1px solid #ddd; padding-bottom:5px;">
        <b style="font-size:16px;">體積的量度 (學生版)</b><br>
        <small>設計者：黃潔芳老師</small>
    </div>

    <div class="volume-box">總體積：<span id="count">0</span> cm³</div>

    <button id="addBtn" class="btn btn-add active">模式：增加積木</button>
    <button id="delBtn" class="btn btn-del">模式：刪除積木</button>
    
    <div class="control-group">
        <label>↕ 上下拆解：</label>
        <input type="range" id="vSplit" min="0" max="2" step="0.01" value="0" style="width:100%">
        <label>↔ 左右展開：</label>
        <input type="range" id="hSplit" min="0" max="2" step="0.01" value="0" style="width:100%">
    </div>
    <button onclick="location.reload()" class="btn" style="background:#6c757d; color:white; margin-top:10px;">清空重設</button>
</div>

<script>
    function toggleUI() {
        const ui = document.getElementById('ui');
        ui.classList.toggle('collapsed');
        document.getElementById('toggleBtn').innerText = ui.classList.contains('collapsed') ? '▶' : '◀';
    }

    let mode = 'add';
    let isMoving = false; // 判斷是否正在旋轉視角
    const cubes = [];
    const layerColors = [0x448aff, 0xffeb3b, 0xff5722, 0xe91e63, 0x00bcd4, 0x4caf50];

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf8f9fa);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(12, 12, 12);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio); // 解決 iPad 解析度偏移
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    // 當旋轉視角時，標記為 isMoving
    controls.addEventListener('change', () => { isMoving = true; });

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const light = new THREE.DirectionalLight(0xffffff, 0.5);
    light.position.set(10, 20, 10);
    scene.add(light);

    scene.add(new THREE.GridHelper(10, 10, 0x444444, 0xcccccc));
    const plane = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), new THREE.MeshLambertMaterial({ visible: false }));
    plane.rotation.x = -Math.PI / 2;
    scene.add(plane);

    const ghost = new THREE.Mesh(
        new THREE.BoxGeometry(1.02, 1.02, 1.02), 
        new THREE.MeshBasicMaterial({ color: 0x28a745, transparent: true, opacity: 0.4 })
    );
    scene.add(ghost);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function updatePositions() {
        const v = parseFloat(document.getElementById('vSplit').value);
        const h = parseFloat(document.getElementById('hSplit').value);
        cubes.forEach(c => {
            c.position.y = c.userData.oy + (c.userData.oy * v);
            c.position.x = c.userData.ox + (c.userData.ox * h);
        });
    }

    // 更新滑鼠坐標，修正 iPad 偏移
    function updateMouse(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
    }

    function onPointerMove(event) {
        if (event.target.closest('#ui')) { ghost.visible = false; return; }
        updateMouse(event);
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects([...cubes, plane]);
        if (intersects.length > 0) {
            const intersect = intersects[0];
            if (mode === 'add') {
                const normal = intersect.face ? intersect.face.normal.clone() : new THREE.Vector3(0,1,0);
                const pos = new THREE.Vector3().copy(intersect.point).add(normal.multiplyScalar(0.5));
                ghost.position.set(Math.floor(pos.x)+0.5, Math.floor(pos.y)+0.5, Math.floor(pos.z)+0.5);
                ghost.visible = true;
                ghost.material.color.setHex(0x28a745);
            } else if (mode === 'del' && intersect.object !== plane) {
                ghost.position.copy(intersect.object.position);
                ghost.visible = true;
                ghost.material.color.setHex(0xff0000);
            }
        } else { ghost.visible = false; }
    }

    // iPad 按下時，重設旋轉狀態
    function onPointerDown() { isMoving = false; }

    function onPointerUp(event) {
        // 如果剛才是在旋轉視角（isMoving 為 true），則不增加積木
        if (isMoving || event.target.closest('#ui')) return;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects([...cubes, plane]);
        if (intersects.length > 0) {
            const intersect = intersects[0];
            if (mode === 'add') {
                const normal = intersect.face ? intersect.face.normal.clone() : new THREE.Vector3(0,1,0);
                const pos = new THREE.Vector3().copy(intersect.point).add(normal.multiplyScalar(0.5));
                addCube(Math.floor(pos.x)+0.5, Math.floor(pos.y)+0.5, Math.floor(pos.z)+0.5);
            } else if (mode === 'del' && intersect.object !== plane) {
                scene.remove(intersect.object);
                cubes.splice(cubes.indexOf(intersect.object), 1);
                updateCount();
            }
        }
    }

    function addCube(x, y, z) {
        if (y < 0 || Math.abs(x) > 5 || Math.abs(z) > 5) return;
        if (cubes.some(c => Math.abs(c.userData.ox - x) < 0.1 && Math.abs(c.userData.oy - y) < 0.1 && Math.abs(c.userData.oz - z) < 0.1)) return;
        const mat = new THREE.MeshLambertMaterial({ color: layerColors[Math.floor(y) % layerColors.length] });
        const cube = new THREE.Mesh(new THREE.BoxGeometry(0.98, 0.98, 0.98), mat);
        cube.position.set(x, y, z);
        cube.userData = { ox: x, oy: y, oz: z };
        scene.add(cube);
        cubes.push(cube);
        updatePositions();
        updateCount();
    }

    document.getElementById('addBtn').onclick = () => { mode = 'add'; document.getElementById('addBtn').className='btn btn-add active'; document.getElementById('delBtn').className='btn btn-del'; };
    document.getElementById('delBtn').onclick = () => { mode = 'del'; document.getElementById('delBtn').className='btn btn-del active'; document.getElementById('addBtn').className='btn btn-add'; };
    document.getElementById('vSplit').oninput = updatePositions;
    document.getElementById('hSplit').oninput = updatePositions;

    function updateCount() { document.getElementById('count').innerText = cubes.length; }

    // 使用觸控友善的事件監聽
    window.addEventListener('touchstart', onPointerDown, {passive: false});
    window.addEventListener('touchend', onPointerUp, {passive: false});
    window.addEventListener('touchmove', onPointerMove, {passive: false});
    // 同時保留滑鼠支援
    window.addEventListener('mousedown', onPointerDown);
    window.addEventListener('mouseup', onPointerUp);
    window.addEventListener('mousemove', onPointerMove);

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    animate();
</script>
</body>
</html>
