<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小五數學科 - 體積量度</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { -webkit-touch-callout: none; -webkit-user-select: none; touch-action: none; box-sizing: border-box; }
        
        body { 
            margin: 0; 
            font-family: 'PingFang HK', 'Heiti TC', 'Microsoft JhengHei', sans-serif; 
            overflow: hidden; 
            background: #f0f2f5; 
        }
        
        #ui { 
            position: absolute; top: 15px; left: 15px; 
            background: rgba(255,255,255,0.98); padding: 18px; 
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); 
            width: 270px; z-index: 1000; 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        #ui.collapsed { transform: translateX(-300px); }
        
        #toggleBtn {
            position: absolute; right: 10px; top: 12px;
            background: #28a745; color: white; border: none;
            border-radius: 4px; width: 32px; height: 32px;
            cursor: pointer; font-weight: bold; font-size: 16px;
            z-index: 1001;
        }
        #ui.collapsed #toggleBtn { right: -42px; border-radius: 0 6px 6px 0; }

        .header { margin-bottom: 12px; padding-right: 30px; }
        
        .subject-badge { 
            background-color: #005bb7; 
            color: white; 
            padding: 2px 10px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: bold;
            display: inline-block;
            margin-bottom: 6px;
        }
        
        .header-title { display: block; font-size: 19px; font-weight: bold; color: #333; margin-bottom: 2px; }
        .header-subtitle { display: block; font-size: 12px; color: #888; margin-bottom: 8px; }
        .header-line { width: 100%; height: 2px; background-color: #28a745; border: none; }

        .volume-box { 
            background: #e8f5e9; padding: 12px; border-radius: 8px; 
            text-align: center; margin: 10px 0; border: 1px solid #c8e6c9; 
            font-size: 22px; font-weight: bold; color: #2e7d32; 
        }
        
        .btn { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; transition: background 0.2s; }
        .btn-add { background: #28a745; color: white; }
        .btn-del { background: #dc3545; color: white; }
        .active { outline: 4px solid #333; box-shadow: 0 0 10px rgba(0,0,0,0.2); }
        
        .control-group { 
            background: #fdfdfd; padding: 12px; border-radius: 8px; 
            border: 1px solid #eee; margin-top: 8px; 
        }
        
        .slider-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;}
        .slider-label { font-size: 14px; font-weight: bold; color: #444; width: 90px; flex-shrink: 0; }
        input[type=range] { width: calc(100% - 95px); height: 25px; cursor: pointer; }
        
        /* 「一鍵還原」按鈕樣式 */
        .btn-restore {
            background-color: #e3f2fd;
            color: #005bb7;
            border: 1px solid #bbdefb;
            margin-top: 5px;
        }
        .btn-restore:active { background-color: #bbdefb; }

        .btn-reset { background:#6c757d; color:white; margin-top:10px; }
        .tip { font-size: 12px; color: #666; margin-top: 8px; text-align: center; font-style: italic; }
    </style>
</head>
<body>

<div id="ui">
    <button id="toggleBtn" onclick="toggleUI()">◀</button>
    <div class="header">
        <div class="subject-badge">小五數學科</div>
        <span class="header-title">體積的量度 (學生版)</span>
        <span class="header-subtitle">設計者：黃潔芳老師</span>
        <div class="header-line"></div>
    </div>
    <div class="volume-box">總體積：<span id="count">0</span> cm³</div>
    <button id="addBtn" class="btn btn-add active" onclick="setMode('add')">模式：增加積木</button>
    <button id="delBtn" class="btn btn-del" onclick="setMode('del')">模式：刪除積木</button>
    
    <div class="control-group">
        <div class="slider-row">
            <label class="slider-label">↕ 垂直展開</label>
            <input type="range" id="vSplit" min="0" max="2" step="0.01" value="0">
        </div>
        <div class="slider-row">
            <label class="slider-label">↔ 橫向展開</label>
            <input type="range" id="hSplit" min="0" max="2" step="0.01" value="0">
        </div>
        <div class="slider-row">
            <label class="slider-label">⤢ 縱向展開</label>
            <input type="range" id="dSplit" min="0" max="2" step="0.01" value="0">
        </div>
        <button onclick="resetSplits()" class="btn btn-restore">↺ 一鍵還原展開</button>
    </div>
    <button onclick="location.reload()" class="btn btn-reset">清空所有積木</button>
</div>

<script>
    function toggleUI() {
        const ui = document.getElementById('ui');
        ui.classList.toggle('collapsed');
        document.getElementById('toggleBtn').innerText = ui.classList.contains('collapsed') ? '▶' : '◀';
    }

    let mode = 'add', cubes = [], startX, startY;
    const layerColors = [0x448aff, 0xffeb3b, 0xff5722, 0xe91e63, 0x00bcd4, 0x4caf50];

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf8f9fa);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(8, 8, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const light = new THREE.DirectionalLight(0xffffff, 0.5);
    light.position.set(10, 20, 10);
    scene.add(light);

    scene.add(new THREE.GridHelper(10, 10, 0xbbbbbb, 0xeeeeee));

    const cubeGeometry = new THREE.BoxGeometry(1, 1, 1);
    const edgesGeometry = new THREE.EdgesGeometry(cubeGeometry);
    const outlineMaterial = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 3 });

    const baseCube = new THREE.Mesh(
        new THREE.BoxGeometry(1.02, 1.02, 1.02), 
        new THREE.MeshBasicMaterial({color: 0xcccccc, transparent: true, opacity: 0.5})
    );
    baseCube.position.set(0.5, 0.5, 0.5);
    baseCube.name = "base";
    scene.add(baseCube);

    const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();

    function onDown(e) {
        const t = e.touches ? e.touches[0] : e;
        startX = t.clientX; startY = t.clientY;
    }

    function onUp(e) {
        if (e.target.closest('#ui')) return;
        const t = e.changedTouches ? e.changedTouches[0] : e;
        const dist = Math.sqrt(Math.pow(t.clientX - startX, 2) + Math.pow(t.clientY - startY, 2));
        if (dist > 10) return;
        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((t.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((t.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(cubes.concat(baseCube.visible ? [baseCube] : []));
        if (intersects.length > 0) {
            const intersect = intersects[0];
            if (mode === 'add') {
                const pos = intersect.object.name === "base" ? 
                    new THREE.Vector3(0.5, 0.5, 0.5) : 
                    intersect.object.position.clone().add(intersect.face.normal);
                addCube(pos.x, pos.y, pos.z);
            } else if (mode === 'del' && intersect.object.name !== "base") {
                scene.remove(intersect.object);
                cubes.splice(cubes.indexOf(intersect.object), 1);
                checkBase(); updateCount();
            }
        }
    }

    function addCube(x, y, z) {
        if (cubes.some(c => Math.abs(c.userData.ox-x)<0.1 && Math.abs(c.userData.oy-y)<0.1 && Math.abs(c.userData.oz-z)<0.1)) return;
        if (y < 0.5) return;
        const cube = new THREE.Mesh(cubeGeometry, new THREE.MeshLambertMaterial({color: layerColors[Math.floor(y)%6]}));
        cube.position.set(x, y, z);
        cube.userData = { ox: x, oy: y, oz: z };

        // 粗邊框優化
        const outlines = new THREE.LineSegments(edgesGeometry, outlineMaterial);
        outlines.scale.set(1.002, 1.002, 1.002);
        cube.add(outlines);

        scene.add(cube);
        cubes.push(cube);
        checkBase(); updateSplits(); updateCount();
    }

    // 檢查是否需要顯示基準灰色積木
    function checkBase() {
        const hasCenter = cubes.some(c => Math.abs(c.userData.ox-0.5)<0.1 && Math.abs(c.userData.oy-0.5)<0.1 && Math.abs(c.userData.oz-0.5)<0.1);
        baseCube.visible = !hasCenter;
    }

    // 一鍵還原展開狀態功能
    function resetSplits() {
        document.getElementById('vSplit').value = 0;
        document.getElementById('hSplit').value = 0;
        document.getElementById('dSplit').value = 0;
        updateSplits();
    }

    // 處理三軸展開演算法 
     function updateSplits() {
        const v = parseFloat(document.getElementById('vSplit').value);
        const h = parseFloat(document.getElementById('hSplit').value);
        const d = parseFloat(document.getElementById('dSplit').value);
        cubes.forEach(c => {
            const level = Math.floor(c.userData.oy - 0.5);
            c.position.y = c.userData.oy + (level * v); 
            c.position.x = c.userData.ox + ((c.userData.ox - 0.5) * h * 0.5); 
            c.position.z = c.userData.oz + ((c.userData.oz - 0.5) * d * 0.5); 
        });
    }

    // 切換增刪模式
    function setMode(m) {
        mode = m;
        document.getElementById('addBtn').className = 'btn btn-add' + (m==='add'?' active':'');
        document.getElementById('delBtn').className = 'btn btn-del' + (m==='del'?' active':'');
    }

    // 更新體積數值
    function updateCount() { document.getElementById('count').innerText = cubes.length; }

    // 事件監聽
    document.getElementById('vSplit').oninput = updateSplits;
    document.getElementById('hSplit').oninput = updateSplits;
    document.getElementById('dSplit').oninput = updateSplits;
    window.addEventListener('mousedown', onDown);
    window.addEventListener('mouseup', onUp);
    window.addEventListener('touchstart', onDown, {passive: false});
    window.addEventListener('touchend', onUp, {passive: false});
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // 渲染循環
    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    animate();
</script>
</body>
</html>
