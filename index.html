<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>小五數學科 - 體積的量度 (學生版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; overflow: hidden; background: #f0f2f5; }
        
        /* 標題資訊區 */
        #header { margin-bottom: 12px; border-bottom: 2px solid #28a745; padding-bottom: 8px; }
        .subject-tag { background: #28a745; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .topic-title { font-size: 18px; font-weight: bold; color: #333; margin-top: 5px; display: block; }
        .author-name { font-size: 12px; color: #777; display: block; margin-top: 2px; }

        #ui { position: absolute; top: 20px; left: 20px; background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); width: 260px; z-index: 10; }
        
        .volume-box { background: #e8f5e9; padding: 12px; border-radius: 8px; text-align: center; margin-bottom: 15px; border: 1px solid #28a745; }
        #count { font-size: 24px; font-weight: bold; color: #2e7d32; }

        .btn { width: 100%; padding: 12px; margin: 5px 0; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        .btn-add { background: #28a745; color: white; }
        .btn-del { background: #dc3545; color: white; }
        .active { outline: 3px solid #000; }
        
        .control-group { background: #f8f9fa; padding: 12px; border-radius: 8px; margin-top: 10px; border: 1px solid #ddd; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #444; }
        input[type=range] { width: 100%; margin-bottom: 10px; cursor: pointer; }
        
        .hint { font-size: 11px; color: #666; margin-top: 10px; line-height: 1.4; }
    </style>
</head>
<body>

<div id="ui">
    <div id="header">
        <span class="subject-tag">小五數學科</span>
        <span class="topic-title">體積的量度 (學生版)</span>
        <span class="author-name">設計者：黃潔芳老師</span>
    </div>

    <div class="volume-box">
        總體積：<span id="count">0</span> cm³
    </div>

    <button id="addBtn" class="btn btn-add active">模式：增加積木</button>
    <button id="delBtn" class="btn btn-del">模式：刪除積木</button>
    
    <div class="control-group">
        <label>↕ 上下拆解演示：</label>
        <input type="range" id="vSplit" min="0" max="2" step="0.01" value="0">
        
        <label>↔ 左右展開演示：</label>
        <input type="range" id="hSplit" min="0" max="2" step="0.01" value="0">
    </div>

    <button onclick="location.reload()" class="btn" style="background:#6c757d; color:white; margin-top:10px;">清空畫布</button>
    
    <div class="hint">
        * 操作提示：<br>
        1. 點擊網格開始砌圖形。<br>
        2. 拉動滑桿觀察內部結構。<br>
        3. 滑鼠右鍵可旋轉視角。
    </div>
</div>

<script>
    let mode = 'add';
    const cubes = [];
    const layerColors = [0x448aff, 0xffeb3b, 0xff5722, 0xe91e63, 0x00bcd4, 0x4caf50];

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf8f9fa);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(12, 12, 12);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const light = new THREE.DirectionalLight(0xffffff, 0.5);
    light.position.set(10, 20, 10);
    scene.add(light);

    // 10x10 網格
    scene.add(new THREE.GridHelper(10, 10, 0x444444, 0xcccccc));
    const plane = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), new THREE.MeshLambertMaterial({ visible: false }));
    plane.rotation.x = -Math.PI / 2;
    scene.add(plane);

    // 預覽框 (Ghost)
    const ghost = new THREE.Mesh(
        new THREE.BoxGeometry(1.01, 1.01, 1.01), 
        new THREE.MeshBasicMaterial({ color: 0x28a745, transparent: true, opacity: 0.4 })
    );
    scene.add(ghost);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    // 更新所有積木位置的函數
    function updatePositions() {
        const vFactor = parseFloat(document.getElementById('vSplit').value);
        const hFactor = parseFloat(document.getElementById('hSplit').value);
        
        cubes.forEach(c => {
            // 垂直位移：基於原始高度
            c.position.y = c.userData.oy + (c.userData.oy * vFactor);
            // 水平位移：以中心線 (x=0) 為基準向兩側展開
            c.position.x = c.userData.ox + (c.userData.ox * hFactor);
        });
    }

    function onPointerMove(event) {
        if (event.target.closest('#ui')) { ghost.visible = false; return; }
        
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        
        const intersects = raycaster.intersectObjects([...cubes, plane]);
        if (intersects.length > 0) {
            const intersect = intersects[0];
            if (mode === 'add') {
                const normal = intersect.face ? intersect.face.normal.clone() : new THREE.Vector3(0,1,0);
                // 這裡使用物理位置計算，確保預覽框對齊
                const pos = new THREE.Vector3().copy(intersect.point).add(normal.multiplyScalar(0.5));
                ghost.position.set(Math.floor(pos.x)+0.5, Math.floor(pos.y)+0.5, Math.floor(pos.z)+0.5);
                ghost.visible = true;
                ghost.material.color.setHex(0x28a745);
            } else if (mode === 'del' && intersect.object !== plane) {
                ghost.position.copy(intersect.object.position);
                ghost.visible = true;
                ghost.material.color.setHex(0xff0000);
            } else { ghost.visible = false; }
        } else { ghost.visible = false; }
    }

    function onPointerDown(event) {
        if (event.target.closest('#ui')) return;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects([...cubes, plane]);

        if (intersects.length > 0) {
            const intersect = intersects[0];
            if (mode === 'add') {
                const normal = intersect.face ? intersect.face.normal.clone() : new THREE.Vector3(0,1,0);
                const pos = new THREE.Vector3().copy(intersect.point).add(normal.multiplyScalar(0.5));
                addCube(Math.floor(pos.x)+0.5, Math.floor(pos.y)+0.5, Math.floor(pos.z)+0.5);
            } else if (mode === 'del' && intersect.object !== plane) {
                scene.remove(intersect.object);
                cubes.splice(cubes.indexOf(intersect.object), 1);
                updateCount();
            }
        }
    }

    function addCube(x, y, z) {
        if (y < 0 || Math.abs(x) > 5 || Math.abs(z) > 5) return;
        if (cubes.some(c => Math.abs(c.userData.ox - x) < 0.1 && Math.abs(c.userData.oy - y) < 0.1 && Math.abs(c.userData.oz - z) < 0.1)) return;

        const mat = new THREE.MeshLambertMaterial({ color: layerColors[Math.floor(y) % layerColors.length] });
        const cube = new THREE.Mesh(new THREE.BoxGeometry(0.98, 0.98, 0.98), mat);
        
        cube.position.set(x, y, z);
        cube.userData = { ox: x, oy: y, oz: z }; // 儲存原始邏輯坐標
        
        scene.add(cube);
        cubes.push(cube);
        updatePositions(); // 確保新積木跟隨當前滑桿狀態
        updateCount();
    }

    document.getElementById('addBtn').onclick = () => { mode = 'add'; document.getElementById('addBtn').className='btn btn-add active'; document.getElementById('delBtn').className='btn btn-del'; };
    document.getElementById('delBtn').onclick = () => { mode = 'del'; document.getElementById('delBtn').className='btn btn-del active'; document.getElementById('addBtn').className='btn btn-add'; };
    
    document.getElementById('vSplit').oninput = updatePositions;
    document.getElementById('hSplit').oninput = updatePositions;

    function updateCount() { document.getElementById('count').innerText = cubes.length; }

    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerdown', onPointerDown);
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    animate();
</script>
</body>
</html>
